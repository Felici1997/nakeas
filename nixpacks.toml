[phases.setup]
nixPkgs = ['php82', 'php82Extensions.mbstring', 'php82Extensions.pdo', 'php82Extensions.pdo_mysql', 'php82Extensions.gd', 'php82Extensions.zip', 'php82Extensions.curl', 'composer']

[phases.build]
cmds = ['composer install --working-dir=core --no-dev --optimize-autoloader --no-interaction']

[start]
cmd = 'cd core && php -S 0.0.0.0:$PORT -t public'
