[phases.setup]
nixPkgs = [
  'php83',
  'php83Extensions.mbstring',
  'php83Extensions.pdo',
  'php83Extensions.pdo_mysql',
  'php83Extensions.gd',
  'php83Extensions.zip',
  'php83Extensions.curl'
]

[phases.build]
cmds = [
  'cd core && php ../composer.phar install --no-dev --optimize-autoloader --no-interaction'
]

[start]
cmd = 'cd core && php -S 0.0.0.0:$PORT -t public'
